<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ממליץ הספרים של ספריית שחרות</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;500;700;900&family=Assistant:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=4">
  <link rel="stylesheet" href="print.css" media="print">
</head>
<body>
  <div class="app">
    <!-- כותרת ראשית -->
    <header class="header">
      <div class="logo-area">
        <img src="assets/logo-placeholder.svg" alt="ספריית שחרות" class="logo" />
      </div>
      <h1>ממליץ הספרים של ספריית שחרות</h1>
      <p class="subtitle">ספרו לנו אילו ספרים אהבתם ונמצא לכם את הספר הבא</p>
    </header>

    <!-- מודאל ספר -->
    <div class="modal-overlay hidden" id="bookModal">
      <div class="modal book-modal">
        <div class="modal-header">
          <div class="book-modal-title-area">
            <h2 id="bookModalTitle"></h2>
            <p class="book-modal-author" id="bookModalAuthor"></p>
          </div>
          <button class="modal-close" id="bookModalClose">✕</button>
        </div>
        <div class="modal-body" id="bookModalBody"></div>
      </div>
    </div>

    <!-- אזור הזנת ספרים -->
    <main class="main">
      <section class="input-section">
        <h2>אילו ספרים אהבתם?</h2>
        <p class="input-hint">הזינו בין 1 ל-5 שמות של ספרים שאהבתם. ככל שתזינו יותר, ההמלצות יהיו מדויקות יותר.</p>

        <div class="book-inputs" id="bookInputs">
          <div class="book-input-row">
            <div class="input-wrapper">
              <input
                type="text"
                class="book-input"
                placeholder="שם הספר..."
                autocomplete="off"
                data-index="0"
              />
              <div class="autocomplete-list" data-index="0"></div>
            </div>
            <span class="match-status" data-index="0"></span>
          </div>
        </div>

        <button class="btn btn-secondary btn-add" id="addBookBtn">+ הוסיפו ספר נוסף</button>

        <!-- פילטרים -->
        <div class="filters-row" id="filtersRow">
          <span class="filter-label">סינון:</span>
          <button class="filter-chip" data-filter="genre" data-value="עיון">עיון</button>
          <button class="filter-chip" data-filter="origin" data-value="ישראלית">ספרות מקור</button>
          <button class="filter-chip" data-filter="language" data-value="translated">מתורגם</button>
          <select class="filter-select" id="moodSelect">
            <option value="">מצב רוח...</option>
            <option value="אבסורדי וייחודי">אבסורדי וייחודי</option>
            <option value="אינטנסיבי ומציף">אינטנסיבי ומציף</option>
            <option value="אפי ועשיר">אפי ועשיר</option>
            <option value="אקשן ועוצמה">אקשן ועוצמה</option>
            <option value="דיסטופי">דיסטופי</option>
            <option value="הומוריסטי">הומוריסטי</option>
            <option value="כבד ומעמיק">כבד ומעמיק</option>
            <option value="מחמם לב">מחמם לב</option>
            <option value="מסתורי ואטמוספרי">מסתורי ואטמוספרי</option>
            <option value="מפחיד ומאיים">מפחיד ומאיים</option>
            <option value="מרגש ומעורר השראה">מרגש ומעורר השראה</option>
            <option value="מתח וסאספנס">מתח וסאספנס</option>
            <option value="נוסטלגי ומרגיע">נוסטלגי ומרגיע</option>
            <option value="עצוב ומרגש">עצוב ומרגש</option>
            <option value="פילוסופי-רעיוני">פילוסופי-רעיוני</option>
            <option value="פנימי ואינטרוספקטיבי">פנימי ואינטרוספקטיבי</option>
            <option value="קליל ומהנה">קליל ומהנה</option>
            <option value="רומנטי">רומנטי</option>
          </select>
        </div>

        <div class="action-row">
          <button class="btn btn-primary" id="getRecsBtn">קבלו המלצות</button>
          <button class="btn btn-secondary" id="randomBtn" title="הפתיעו אותי">🎲 הפתיעו אותי</button>
          <button class="btn btn-ghost" id="clearBtn">נקו הכל</button>
        </div>
      </section>

      <!-- מצב טעינה -->
      <section class="loading-section hidden" id="loadingSection">
        <div class="loading-spinner"></div>
        <p>מחפשים את הספרים המושלמים בשבילכם...</p>
      </section>

      <!-- תוצאות -->
      <section class="results-section hidden" id="resultsSection">
        <div class="results-header">
          <h2 id="resultsTitle">ההמלצות שלנו</h2>
          <p class="results-subtitle" id="resultsSubtitle"></p>
        </div>

        <div class="results-grid" id="resultsGrid">
          <!-- כרטיסי המלצות ייבנו דינמית -->
        </div>

        <div class="results-footer">
          <button class="btn btn-secondary" id="printBtn">🖨️ הדפסה</button>
          <button class="btn btn-ghost" id="tryAgainBtn">נסו שוב עם ספרים אחרים</button>
        </div>
      </section>

      <!-- מצב ריק / בעיה -->
      <section class="empty-section hidden" id="emptySection">
        <div class="empty-content">
          <p class="empty-icon">📚</p>
          <p class="empty-text" id="emptyText"></p>
          <button class="btn btn-secondary" id="emptyRetryBtn">נסו שוב</button>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>ממליץ הספרים של ספריית שחרות | נבנה באהבה לקהילה</p>
    </footer>
  </div>

  <!-- טעינת נתונים וקוד -->
  <script src="data/general_catalog.js"></script>
  <script src="data/local_library_merged.js?v=1"></script>
  <script src="data/embeddings_merged.js"></script>
  <script src="recommender.js?v=2"></script>
  <script src="app.js?v=17"></script>
</body>
</html>
